<html lang="en">
<head>
<meta charset="UTF-8">

<title>CODE: Critical Care</title>
<style>
  :root{--bg:#0b1b2b;--card:#13283d;--card2:#1b3a57;--txt:#eaf2fb;--mut:#8fb0cc;
        --good:#1fbf75;--bad:#e0414d;--accent:#ffb020;--line:#284a6b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{max-width:560px;margin:0 auto;padding:14px 14px env(safe-area-inset-bottom);min-height:100vh}
  h1{font-size:20px;margin:6px 0 2px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin:10px 0;box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .badge{background:var(--card2);border:1px solid var(--line);border-radius:999px;
    padding:6px 12px;font-size:13px;font-weight:700}
  .bar{height:10px;background:#0e2236;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#1fbf75,#7fe3b4);width:0%}
  button{font:inherit;color:var(--txt);cursor:pointer}
  .opt{display:block;width:100%;text-align:left;background:var(--card2);
    border:1px solid var(--line);border-radius:12px;padding:14px;margin:8px 0;font-size:15px}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:#13402c;border-color:var(--good)}
  .opt.wrong{background:#3f1620;border-color:var(--bad)}
  .opt:disabled{opacity:.97}
  .primary{width:100%;background:linear-gradient(90deg,#ffb020,#ffce6b);color:#22160a;
    border:0;border-radius:12px;padding:15px;font-size:16px;font-weight:800;margin-top:10px}
  .ghost{background:transparent;border:1px solid var(--line);border-radius:12px;
    padding:12px;font-size:14px;color:var(--mut);width:100%;margin-top:8px}
  .mods label{display:flex;align-items:center;gap:10px;background:var(--card2);
    border:1px solid var(--line);border-radius:12px;padding:12px;margin:7px 0;font-size:14px}
  .mods input{width:20px;height:20px;accent-color:var(--accent)}
  .mlvl{margin-left:auto;font-size:11px;color:var(--mut)}
  .why{background:#0e2236;border-left:3px solid var(--accent);border-radius:8px;
    padding:12px;margin-top:12px;font-size:14px;color:#cfe2f3;line-height:1.5}
  .q{font-size:17px;line-height:1.45;margin:2px 0 12px;font-weight:600}
  .big{font-size:30px;font-weight:800;margin:6px 0}
  .center{text-align:center}.small{font-size:12px;color:var(--mut)}
  .combo{color:var(--accent);font-weight:800}
  a{color:var(--accent)}
</style>

{m:3,d:1,q:"MAP ≈",o:["HR×SV","CO×SVR","SV/HR","Pre×after"],a:1,w:"Body's Ohm's law."},

{m:3,d:3,q:"A vasodilator in a failing heart:",o:["↑resistance to eject","↓afterload → easier forward flow","Stops heart","Raises K⁺"],a:1,w:"Core HF lever."},
{m:3,d:3,q:"Norepinephrine in septic shock targets:",o:["Preload","SVR (↑ → ↑MAP)","Contractility only","HR only"],a:1,w:"Restores tone to MAP≥65."},
{m:3,d:3,q:"Fluids in shock primarily raise:",o:["Afterload","Preload","SVR","HR"],a:1,w:"Refill the tank → ↑SV."},
{m:3,d:3,q:"Cardiogenic shock is:",o:["Empty tank","Broken pump (big MI)","Floppy pipes","Blocked pipe"],a:1,w:"NOT a fluid-bolus problem."},
{m:3,d:3,q:"Baroreceptors are located in:",o:["Lungs","Carotid sinus & aortic arch","Kidneys","Brainstem only"],a:1,w:"Sense arterial pressure."},
{m:3,d:2,q:"Pure afterload reducer effect:",o:["Harder ejection","Easier ejection / better forward flow","↑SVR","↑HR"],a:1,w:"Vasodilator unloads the pump."},
{m:3,d:1,q:"Diastole vs systole:",o:["Filling vs contracting","Contracting vs filling","Both filling","Both contracting"],a:0,w:"Coronary flow ≈ diastolic."},

{m:3,d:2,q:"Ejection fraction is:",o:["HR×SV","SV ÷ end-diastolic volume","MAP/SVR","Preload×2"],a:1,w:"Fraction of filled volume ejected."},

{m:4,d:1,q:"Heart failure is:",o:["Infection","Pump too weak/stiff to meet demand","High K⁺","Lung disease"],a:1,w:"Systolic or diastolic."},

{m:5,d:2,q:"Type 1 vs Type 2:",o:["T1 oxygenation(low O₂); T2 ventilation(high CO₂)","Identical","T1 fatal","T2 normal CO₂"],a:0,w:"T2 → resp acidosis."},
{m:5,d:2,q:"Pursed-lip breathing helps by:",o:["Speeding exhale","Slowing exhale, preventing airway collapse","Raising CO₂","Lowering O₂"],a:1,w:"COPD technique."},
{m:5,d:2,q:"Asthma inhaler order:",o:["Steroid then rescue","Rescue (bronchodilator) THEN steroid; rinse after","Only steroid","Irrelevant"],a:1,w:"Open airways first."},
{m:5,d:2,q:"Non-rebreather mask is for:",o:["Mild stable","Emergency / severe hypoxia","Eating","Sleep"],a:1,w:"~60–95% FiO₂."},
{m:5,d:2,q:"Capnography/EtCO₂ catches:",o:["Hyperkalemia","Hypoventilation early (before SpO₂ falls)","Low Na⁺","Anemia"],a:1,w:"Real-time ventilation/perfusion."},
{m:5,d:3,q:"ARDS refractory hypoxemia via:",o:["Dead space","Widespread shunt (flooded alveoli)","High pH","Bradycardia"],a:1,w:"O₂ won't fix → PEEP/vent."},
{m:5,d:3,q:"Hypoventilation ABG:",o:["Resp alkalosis","Resp acidosis (CO₂↑ pH↓)","Met alkalosis","No change"],a:1,w:"M2 link."},
{m:5,d:3,q:"COPD chronic retainer + O₂:",o:["Withhold O₂","Titrate to ordered target (~88–92%), watch CO₂/drowsy","Always 15L","O₂ toxic instantly"],a:1,w:"Don't withhold; don't over-oxygenate blindly."},
{m:5,d:3,q:"Sudden dyspnea, sharp pain, clear lungs, SpO₂86%:",o:["Pneumonia","PE (dead space)","Asthma","Normal"],a:1,w:"Clot blocks perfusion."},
{m:5,d:3,q:"Refractory low SpO₂ on high O₂ — best:",o:["↑O₂, recheck in 1h","Escalate (shunt — needs PEEP/vent)","Document only","Stop O₂"],a:1,w:"More FiO₂ won't fix shunt."},
{m:5,d:3,q:"Opioid → which failure + reversal:",o:["Type1; fluids","Type2 (hypoventilation); naloxone","Type1; naloxone","None"],a:1,w:"CO₂↑ → resp acidosis."},
{m:5,d:3,q:"Delegation in acute resp distress:",o:["UAP manages it","RN assesses/acts; never leave patient","Document later","Provider only by phone"],a:1,w:"Unstable airway = RN, act."},
{m:5,d:1,q:"Diffusion (Fick) improves with:",o:["Thicker membrane","More area, bigger ΔP, thinner membrane","Less area","Edema"],a:1,w:"Edema/fibrosis impair it."},
{m:5,d:2,q:"SpO₂ can be misleading in:",o:["Healthy lungs","Anemia / CO poisoning / poor perfusion","High altitude only","Never"],a:1,w:"Saturation ≠ delivery."},
{m:5,d:3,q:"First action — patient in acute distress:",o:["Chart it","Position upright + O₂ + call; stay","Reassess in 1h","Order labs only"],a:1,w:"Airway/Breathing now."}
];
Q.forEach((q,i)=>q.id=i);

const RANKS=["🟢 Student","🔵 New Grad RN","🟣 ICU RN","🟠 Rapid Response","🔴 Resus Lead"];
const MN={1:"Homeostasis & the Cell",2:"Fluids · Lytes · Acid–Base",3:"Cardiovascular Physiology",4:"Cardiovascular Patho",5:"Respiratory & Gas Exchange"};
const RUN=15, PASS=11, MAXLVL=4, KEY="codecc_v3";
let S=load();
function def(){return{prog:{},seen:{},last:{},best:0,streak:0,lastDay:"",sel:[1]}}
function load(){try{return Object.assign(def(),JSON.parse(localStorage.getItem(KEY)))}catch(e){return def()}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function keyOf(s){return s.slice().sort((a,b)=>a-b).join("-")}
function lvl(s){return S.prog[keyOf(s)]||0}
function setLvl(s,v){S.prog[keyOf(s)]=v;save()}
const app=document.getElementById('app');
let G=null;
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

/* fresh, non-repeating 15 per level; difficulty preference rises with level */
function buildRun(sel,level){
  const k=keyOf(sel), pool=Q.filter(x=>sel.includes(x.m));
  let seen=S.seen[k]||[];
  let unseen=pool.filter(q=>!seen.includes(q.id));
  let cycled=false;
  if(unseen.length<RUN){                       // exhausted → new cycle
    cycled=true;
    const last=S.last[k]||[];
    S.seen[k]=[]; seen=[];
    unseen=pool.filter(q=>!last.includes(q.id)); // never repeat the prior level's set
    if(unseen.length<RUN) unseen=pool.slice();
  }
  const want=[1,1.6,2,2.4,3][level];           // harder each level
  unseen=shuf(unseen).sort((a,b)=>Math.abs(a.d-want)-Math.abs(b.d-want));
  let pick=unseen.slice(0,RUN).sort((a,b)=>a.d-b.d); // ramp within run
  const ids=pick.map(q=>q.id);
  S.seen[k]=(S.seen[k]||[]).concat(ids);
  S.last[k]=ids; save();
  return {pick,cycled};
}

function home(){
  const sel=S.sel,L=lvl(sel);
  app.innerHTML=`
  <div class="card">
    <div class="row"><span class="badge">${RANKS[L]}</span>
      <span class="small">Level ${L+1}/5 · ${sel.length>1?"mixed":"M"+sel[0]}</span></div>
    <div class="bar" style="margin-top:10px"><i style="width:${L/MAXLVL*100}%"></i></div>
    <div class="small" style="margin-top:8px">🔥 best ${S.best} · 🗓️ ${S.streak}d ·
      each level = a <b>fresh 15</b> (no repeats until the bank cycles)</div>
  </div>
  <div class="card">
    <b>Pick module(s)</b> <span class="small">— each has its own level</span>
    <div class="mods" id="mods">
      ${[1,2,3,4,5].map(m=>`<label><input type="checkbox" value="${m}" ${sel.includes(m)?"checked":""}
        onchange="reSel()"><span><b>M${m}</b> · ${MN[m]}</span>
        <span class="mlvl">${RANKS[S.prog[String(m)]||0].split(" ")[0]} L${(S.prog[String(m)]||0)+1}</span></label>`).join("")}
    </div>
    <button class="ghost" onclick="allMods()">Select all 5 (mixed)</button>
    <button class="primary" onclick="run()">▶ Start — fresh 15 · ${RANKS[L]}</button>
  </div>
  <div class="card small">Pass <b>${PASS}/15</b> → rank up; next run pulls 15 you
    haven't seen, harder. <button class="ghost" onclick="reset()">Reset all</button></div>`;
}
function reSel(){const s=[...document.querySelectorAll('#mods input:checked')].map(x=>+x.value);
  if(s.length){S.sel=s;save();home();}}
function allMods(){S.sel=[1,2,3,4,5];save();home();}
function reset(){if(confirm("Erase all progress?")){S=def();save();home();}}

function run(){
  const sel=S.sel; if(!sel.length){alert("Pick a module");return}
  const L=lvl(sel), today=new Date().toISOString().slice(0,10);
  if(S.lastDay!==today){const y=new Date();y.setDate(y.getDate()-1);
    S.streak=(S.lastDay===y.toISOString().slice(0,10))?S.streak+1:1;S.lastDay=today;save();}
  const {pick,cycled}=buildRun(sel,L);
  G={sel,L,pool:pick,cycled,i:0,correct:0,combo:0,score:0,best:0};
  ask();
}
function ask(){
  const it=G.pool[G.i], opts=shuf(it.o.map((t,idx)=>({t,idx})));
  G.cur={it,opts};
  app.innerHTML=`
  <div class="card">
    <div class="row"><span class="badge">${RANKS[G.L]}</span>
      <span class="small">Q ${G.i+1}/${RUN} · M${it.m} · ${"★".repeat(it.d)}</span></div>
    <div class="bar" style="margin-top:8px"><i style="width:${G.i/RUN*100}%"></i></div>
    <div class="row" style="margin-top:10px"><span class="combo">🔥×${G.combo}</span>
      <span class="small">✔ ${G.correct} · need ${PASS}</span></div>
  </div>
  <div class="card"><div class="q">${it.q}</div>
    <div id="opts">${opts.map((o,k)=>`<button class="opt" onclick="ans(${k})">${o.t}</button>`).join("")}</div>
    <div id="post"></div></div>`;
}
function ans(k){
  const{it,opts}=G.cur, right=opts[k].idx===it.a;
  [...document.querySelectorAll('#opts .opt')].forEach((b,idx)=>{b.disabled=true;
    if(opts[idx].idx===it.a)b.classList.add('correct');
    if(idx===k&&!right)b.classList.add('wrong');});
  if(right){G.combo++;G.correct++;G.score+=10*it.d*G.combo;if(G.combo>G.best)G.best=G.combo;
    if(G.combo>S.best){S.best=G.combo;save();}} else G.combo=0;
  document.getElementById('post').innerHTML=
    `<div class="why"><b>${right?"✅ correct":"❌"}</b> — ${it.w}</div>
     <button class="primary" onclick="nx()">${G.i+1>=RUN?"See result":"Next ▶"}</button>`;
}
function nx(){ if(++G.i>=RUN) return res(); ask(); }
function res(){
  const pass=G.correct>=PASS, sel=G.sel, L=G.L; let msg="",act="";
  if(pass&&L<MAXLVL){ setLvl(sel,L+1);
    msg=`🎉 <b>RANK UP → ${RANKS[L+1]}</b><br>Next run = a different, harder 15.`; }
  else if(pass&&L===MAXLVL){ msg=`🏆 <b>MODULE MASTERED (${RANKS[L]})!</b>`;
    if(sel.length===1){ const n=sel[0]+1;
      if(MN[n]){ act=`<button class="primary" onclick="goNext(${n})">➡ Next: M${n} ${MN[n]} (start 🟢)</button>`;
        msg+=`<br>Ready for Module ${n}.`; } else msg+="<br>Last built module — more coming."; } }
  else msg=`Need <b>${PASS}/15</b> to rank up — got ${G.correct}. Same level; next try is a fresh 15.`;
  app.innerHTML=`
  <div class="card center">
    <div class="big">${pass?"✅ Passed":"🔁 Keep going"}</div>
    <div>${G.correct}/15 · score ${G.score} · 🔥 ${G.best}${G.cycled?' · ↻ bank cycled':''}</div>
    <div class="why" style="text-align:left;margin-top:12px">${msg}</div>
    ${act}
    <button class="primary" onclick="run()">Play again (${RANKS[lvl(sel)]})</button>
    <button class="ghost" onclick="home()">Home / change modules</button>
  </div>`;
}
function goNext(m){S.sel=[m];save();home();}
home();
</script>
</body>
