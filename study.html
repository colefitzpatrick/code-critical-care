<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1b2b">
<title>Study Reader — CODE: Critical Care</title>
<style>
  :root{--bg:#0b1b2b;--card:#13283d;--card2:#1b3a57;--txt:#eef4fb;--mut:#9bbad6;
        --accent:#ffb020;--line:#2b4e70;--blue:#5fb0ef;--good:#46d196;--red:#ff7a85;
        --warn:#ffce6b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.6}
  .wrap{max-width:680px;margin:0 auto;padding:12px 14px env(safe-area-inset-bottom)}
  header{position:sticky;top:0;background:rgba(11,27,43,.97);backdrop-filter:blur(6px);
    z-index:9;border-bottom:1px solid var(--line);padding:10px 0}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select{flex:1;min-width:120px;background:var(--card2);color:var(--txt);border:1px solid var(--line);
    border-radius:10px;padding:10px;font-size:14px}
  .lnk{background:var(--card2);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;color:var(--accent);font-weight:700;font-size:13px;text-decoration:none}
  .content{padding:14px 0 30px}
  h1,h2,h3{line-height:1.25;font-weight:800}
  h1{font-size:23px;color:#fff;border-bottom:3px solid var(--accent);padding-bottom:6px;margin:18px 0 10px}
  h2{font-size:19px;color:var(--warn);margin:22px 0 8px}
  h3{font-size:16px;color:var(--blue);margin:18px 0 6px}
  p{margin:8px 0}
  strong{color:#fff}
  ul,ol{margin:8px 0;padding-left:22px}
  li{margin:5px 0}
  li strong:first-child{color:var(--accent)}
  code{background:#0e2236;border:1px solid var(--line);border-radius:5px;padding:1px 5px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.85em;color:#bfe3ff}
  pre{background:#08151f;border:1px solid var(--line);border-left:4px solid var(--blue);
    border-radius:10px;padding:12px;overflow-x:auto;font-size:12px;line-height:1.4}
  pre code{background:none;border:0;padding:0;color:#cfe6f5}
  table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px;text-align:left}
  th{background:#143357;color:#fff;font-weight:800}
  tr:nth-child(even) td{background:#16304a}
  hr{border:0;border-top:1px solid var(--line);margin:18px 0}
  blockquote{margin:14px 0;padding:0}
  .callout{border-radius:12px;padding:12px 14px;margin:14px 0;border:1px solid;font-size:14.5px}
  .c-blue{background:#10283e;border-color:#2f6fa0}
  .c-amber{background:#33270e;border-color:#9c7a2f}
  .c-red{background:#3a1620;border-color:#9c3340}
  .c-green{background:#10331f;border-color:#2f7a4f}
  .callout strong{color:#fff}
  details{background:#0e2236;border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;margin:12px 0}
  summary{cursor:pointer;font-weight:800;color:var(--accent)}
  details[open]{border-color:var(--accent)}
  .chk{list-style:none;margin-left:-22px}
  .chk li{padding-left:26px;position:relative}
  .chk li::before{content:"☐";position:absolute;left:0;color:var(--accent);font-size:18px}
  .nav{display:flex;gap:10px;margin:20px 0}
  .nav button{flex:1;background:var(--card2);color:var(--txt);border:1px solid var(--line);
    border-radius:12px;padding:14px;font-size:15px;font-weight:700}
  .nav button:disabled{opacity:.4}
  .crumb{color:var(--mut);font-size:12px;margin:6px 0 2px}
  .err{background:#3a1620;border:1px solid #9c3340;border-radius:10px;padding:14px}
</style>
</head>
<body>
<header><div class="wrap"><div class="bar">
  <select id="mod" onchange="onMod()"></select>
  <select id="file" onchange="render()"></select>
  <a class="lnk" href="game.html">🎮 Game</a>
</div></div></header>
<div class="wrap">
  <div class="crumb" id="crumb"></div>
  <div class="content" id="out">Loading…</div>
  <div class="nav"><button id="prev" onclick="step(-1)">◀ Prev</button>
    <button id="next" onclick="step(1)">Next ▶</button></div>
</div>
<script>
const MODS=[
 {k:"Module_01_Homeostasis_and_the_Cell",n:"M1 · Homeostasis & the Cell"},
 {k:"Module_02_Fluids_Electrolytes_AcidBase",n:"M2 · Fluids·Lytes·Acid–Base"},
 {k:"Module_03_Cardiovascular_Physiology",n:"M3 · Cardiovascular Physiology"},
 {k:"Module_04_Cardiovascular_Pathophysiology",n:"M4 · Cardiovascular Patho"},
 {k:"Module_05_Respiratory_Physiology_GasExchange",n:"M5 · Respiratory & Gas Exchange"},
 {k:"_REFERENCE",n:"📋 Quick Reference (numbers + fishbones)"}];
const BASE=["00_START_HERE","01_Big_Picture","02_Concept_Map","03_Notes_Logic_Chains",
 "04_Recall_Sets","05_Clinical_Reasoning","06_Spaced_Review"];
function filesFor(i){
  if(MODS[i].k==="_REFERENCE") return ["Key_Numbers"];
  let f=BASE.slice(); if(i>=3) f.push("07_NCLEX_and_Nursing_Actions");
  f.push("_GLOSSARY"); return f;
}
const PRETTY={ "00_START_HERE":"Start Here","01_Big_Picture":"Big Picture",
 "02_Concept_Map":"Concept Map","03_Notes_Logic_Chains":"Logic Chains",
 "04_Recall_Sets":"Recall Sets","05_Clinical_Reasoning":"Clinical Reasoning",
 "06_Spaced_Review":"Spaced Review","07_NCLEX_and_Nursing_Actions":"NCLEX & Nursing",
 "_GLOSSARY":"Glossary","Key_Numbers":"Numbers & Fishbones"};

const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function inline(s){
  return s
   .replace(/`([^`]+)`/g,(m,x)=>"<code>"+x+"</code>")
   .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
   .replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>")
   .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" style="color:var(--accent)">$1</a>');
}
function calloutClass(t){
  if(/⛔|CONFIDENTIAL|Rule #0|never disclose|flight risk/i.test(t)) return "c-red";
  if(/✅|DONE|mastered|RANK UP|status:|🎉/i.test(t)) return "c-green";
  if(/⚠|Key terms|caution|trap|new term|new medical/i.test(t)) return "c-amber";
  return "c-blue";
}
function mdToHtml(md){
  const lines=md.replace(/\r/g,"").split("\n");
  let html="",i=0,inCode=false,buf=[];
  const flushP=()=>{ if(buf.length){html+="<p>"+inline(esc(buf.join(" ")))+"</p>";buf=[];} };
  while(i<lines.length){
    let ln=lines[i];
    if(ln.trim().startsWith("```")){ flushP();
      if(!inCode){inCode=true;html+="<pre><code>";}
      else{inCode=false;html+="</code></pre>";} i++; continue; }
    if(inCode){ html+=esc(ln)+"\n"; i++; continue; }
    if(/^<details|^<\/details|^<summary|^<\/summary>/.test(ln.trim())){
      flushP();
      html+=ln.replace(/<summary>(.*?)<\/summary>/,(m,x)=>"<summary>"+inline(esc(x))+"</summary>");
      i++; continue; }
    if(/^#{1,3}\s/.test(ln)){ flushP(); const lv=ln.match(/^#+/)[0].length;
      html+="<h"+lv+">"+inline(esc(ln.replace(/^#+\s/,"")))+"</h"+lv+">"; i++; continue; }
    if(/^---+\s*$/.test(ln)){ flushP(); html+="<hr>"; i++; continue; }
    if(ln.trim().startsWith(">")){ flushP(); let q=[];
      while(i<lines.length && lines[i].trim().startsWith(">")){
        q.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      const body=q.join("\n"); const cls=calloutClass(body);
      html+='<div class="callout '+cls+'">'+mdInlineBlock(body)+"</div>"; continue; }
    if(/^\s*\|.*\|/.test(ln) && i+1<lines.length && /^\s*\|[-:\s|]+\|/.test(lines[i+1])){
      flushP(); let rows=[];
      while(i<lines.length && /^\s*\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      html+=renderTable(rows); continue; }
    if(/^\s*(-|\*|\d+\.)\s/.test(ln)){ flushP();
      let isChk=/^\s*-\s\[\s?\]/.test(ln);
      let ol=/^\s*\d+\.\s/.test(ln);
      html+="<ul class='"+(isChk?"chk":"")+"'>";
      while(i<lines.length && /^\s*(-|\*|\d+\.)\s/.test(lines[i])){
        let t=lines[i].replace(/^\s*(-|\*|\d+\.)\s/,"").replace(/^\[\s?\]\s?/,"");
        html+="<li>"+inline(esc(t))+"</li>"; i++; }
      html+="</ul>"; continue; }
    if(ln.trim()===""){ flushP(); i++; continue; }
    buf.push(ln.trim()); i++;
  }
  flushP(); return html;
}
function mdInlineBlock(s){ // for callout contents: bold/links/inline + simple bullets
  return s.split("\n").map(l=>{
    if(/^\s*-\s/.test(l)) return "• "+inline(esc(l.replace(/^\s*-\s/,"")));
    return inline(esc(l));
  }).join("<br>");
}
function renderTable(rows){
  rows=rows.filter(r=>!/^\s*\|[-:\s|]+\|\s*$/.test(r));
  let out="<table>";
  rows.forEach((r,idx)=>{
    let cells=r.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(c=>c.trim());
    out+="<tr>"+cells.map(c=>(idx===0?"<th>":"<td>")+inline(esc(c))+(idx===0?"</th>":"</td>")).join("")+"</tr>";
  });
  return out+"</table>";
}

let mi=0, fi=0;
function init(){
  const ms=document.getElementById('mod');
  MODS.forEach((m,j)=>ms.add(new Option(m.n,j)));
  const q=new URLSearchParams(location.search);
  mi=Math.min(MODS.length-1,Math.max(0,+(q.get('m')||0)));
  ms.value=mi; fillFiles(); render();
}
function fillFiles(){
  const fs=document.getElementById('file'); fs.innerHTML="";
  filesFor(mi).forEach((f,j)=>fs.add(new Option(PRETTY[f]||f,j)));
  fi=0; fs.value=0;
}
function onMod(){ mi=+document.getElementById('mod').value; fillFiles(); render(); }
function step(d){ const F=filesFor(mi);
  fi+=d; if(fi<0)fi=0; if(fi>=F.length)fi=F.length-1;
  document.getElementById('file').value=fi; render(); }
async function render(){
  fi=+document.getElementById('file').value;
  const F=filesFor(mi), m=MODS[mi], file=F[fi];
  document.getElementById('crumb').textContent=m.n+"  ›  "+(PRETTY[file]||file);
  document.getElementById('prev').disabled=fi===0;
  document.getElementById('next').disabled=fi===F.length-1;
  const url="study/"+m.k+"/"+file+".md";
  const out=document.getElementById('out'); out.innerHTML="Loading…";
  try{
    const r=await fetch(url,{cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    out.innerHTML=mdToHtml(await r.text());
    window.scrollTo(0,0);
  }catch(e){
    out.innerHTML='<div class="err">Couldn\'t load <code>'+url+'</code> ('+e.message+
      ').<br>If you opened this file directly, use the deployed link instead '+
      '(browsers block local file loading).</div>';
  }
}
init();
</script>
</body>
</html>
