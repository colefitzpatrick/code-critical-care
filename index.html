<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b1b2b">
<title>CODE: Critical Care</title>
<style>
  :root{--bg:#0b1b2b;--card:#13283d;--card2:#1b3a57;--txt:#eaf2fb;--mut:#8fb0cc;
        --good:#1fbf75;--bad:#e0414d;--accent:#ffb020;--line:#284a6b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{max-width:560px;margin:0 auto;padding:14px 14px env(safe-area-inset-bottom);min-height:100vh}
  h1{font-size:20px;margin:6px 0 2px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin:10px 0;box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .badge{background:var(--card2);border:1px solid var(--line);border-radius:999px;
    padding:6px 12px;font-size:13px;font-weight:700}
  .bar{height:10px;background:#0e2236;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#1fbf75,#7fe3b4);width:0%}
  button{font:inherit;color:var(--txt);cursor:pointer}
  .opt{display:block;width:100%;text-align:left;background:var(--card2);
    border:1px solid var(--line);border-radius:12px;padding:14px;margin:8px 0;font-size:15px}
  .opt:active{transform:scale(.99)}
  .opt.correct{background:#13402c;border-color:var(--good)}
  .opt.wrong{background:#3f1620;border-color:var(--bad)}
  .opt:disabled{opacity:.97}
  .primary{width:100%;background:linear-gradient(90deg,#ffb020,#ffce6b);color:#22160a;
    border:0;border-radius:12px;padding:15px;font-size:16px;font-weight:800;margin-top:10px}
  .ghost{background:transparent;border:1px solid var(--line);border-radius:12px;
    padding:12px;font-size:14px;color:var(--mut);width:100%;margin-top:8px}
  .mods label{display:flex;align-items:center;gap:10px;background:var(--card2);
    border:1px solid var(--line);border-radius:12px;padding:12px;margin:7px 0;font-size:14px}
  .mods input{width:20px;height:20px;accent-color:var(--accent)}
  .mlvl{margin-left:auto;font-size:11px;color:var(--mut)}
  .why{background:#0e2236;border-left:3px solid var(--accent);border-radius:8px;
    padding:12px;margin-top:12px;font-size:14px;color:#cfe2f3;line-height:1.5}
  .q{font-size:17px;line-height:1.45;margin:2px 0 12px;font-weight:600}
  .big{font-size:30px;font-weight:800;margin:6px 0}
  .center{text-align:center}.small{font-size:12px;color:var(--mut)}
  .combo{color:var(--accent);font-weight:800}
</style>
</head>
<body>
<h1>🎮 CODE: Critical Care</h1>
<div class="sub">Phone → Share → <b>Add to Home Screen</b>. Offline. Progress saves per module.</div>

<script>
/* ===== BANK  (mod 1-5 | d 1 easy/2 med/3 hard | a = correct index) ===== */
const Q=[
/* M1 */
{m:1,d:1,q:"Na⁺/K⁺-ATPase moves:",o:["3 Na⁺ out / 2 K⁺ in per ATP","2 Na⁺ out / 3 K⁺ in, no ATP","K⁺ out / Na⁺ in passively","Only water"],a:0,w:"3 Na⁺ out / 2 K⁺ in per ATP — the engine of every gradient."},
{m:1,d:1,q:"Passive vs active transport is decided by:",o:["Molecule size","Does it need ATP / go against the gradient?","Is it in blood?","Is it charged?"],a:1,w:"Active = uphill, needs ATP; passive = downhill, free."},
{m:1,d:1,q:"Resting membrane potential (~−70mV) is set mainly by:",o:["Na⁺","Ca²⁺","K⁺","Cl⁻"],a:2,w:"The K⁺ gradient dominates RMP."},
{m:1,d:1,q:"Ischemia =",o:["Low oxygen only","Too little blood flow to a tissue","High potassium","Fever"],a:1,w:"A flow deficit (cuts O₂+glucose+waste removal)."},
{m:1,d:1,q:"Shock =",o:["An infection","Systemic inadequate perfusion (endpoint)","Low sodium","Fast heart rate"],a:1,w:"Perfusion-failure endpoint; many causes."},
{m:1,d:1,q:"ATP is the cell's:",o:["Waste product","Energy currency","Membrane","Ion"],a:1,w:"What the pump spends to do work."},
{m:1,d:2,q:"Rising serum K⁺ ECG sequence:",o:["U waves → flat T","Peaked T → wide QRS → sine wave → arrest","No change","ST elevation only"],a:1,w:"Hyperkalemia drifts RMP toward threshold."},
{m:1,d:2,q:"Why does ischemia kill faster than pure hypoxia?",o:["Removes O₂ only","Removes O₂ AND glucose AND waste removal","Raises pH","Cools the cell"],a:1,w:"Triple hit vs O₂-only."},
{m:1,d:2,q:"Hypotonic IV fluid makes cells:",o:["Shrink","Unchanged","Swell (water enters)","Clot"],a:2,w:"Water follows solute in → swelling (cerebral edema risk)."},
{m:1,d:2,q:"In FEVER the broken control block is the:",o:["Effector","Set point (raised by pyrogens)","Sensor","Pump"],a:1,w:"Fever=set point↑→antipyretic; hyperthermia=effector fail→cool."},
{m:1,d:2,q:"Digoxin + LOW K⁺ is dangerous because:",o:["Digoxin needs K⁺","They compete at the Na⁺/K⁺ pump → more digoxin binds","Low K⁺ destroys digoxin","Unrelated"],a:1,w:"Less competition → amplified digoxin effect → toxicity."},
{m:1,d:2,q:"Isotonic fluid (0.9% NaCl) mainly:",o:["Swells cells","Stays extracellular, expands volume","Shrinks cells","Is free water"],a:1,w:"~Isotonic → stays in ECF; volume resuscitation."},
{m:1,d:3,q:"One ATP-starved pump produces:",o:["Hypokalemia + high pH","Hyperkalemia + lactate↑ + oliguria + EtCO₂↓","Only high Na⁺","No change"],a:1,w:"The detection map cluster."},
{m:1,d:3,q:"Septic shock starves cells via which TWO hypoxia types?",o:["Anemic + hypoxemic","Stagnant (delivery) + histotoxic (can't use O₂)","Only stagnant","Only histotoxic"],a:1,w:"Delivery fails AND mitochondria can't use O₂."},
{m:1,d:3,q:"MAP primarily measures:",o:["Blood O₂ content","Perfusion/flow pressure (ischemia side)","Lung function","Potassium"],a:1,w:"SpO₂/PaO₂ are the oxygen side; MAP = flow."},
{m:1,d:3,q:"Pump failure shows in labs mainly as:",o:["Low Na⁺","Hyperkalemia (K⁺ leaves cells)","High Ca²⁺","Low glucose"],a:1,w:"K⁺ is the lab you see; serum Na⁺ shift is not clean."},
{m:1,d:3,q:"A pathologic positive-feedback loop:",o:["Self-corrects","Won't stop without an external break (e.g., shock spiral)","Stabilizes BP","Is the baroreflex"],a:1,w:"Self-amplifying → must break it from outside."},
/* M2 */
{m:2,d:1,q:"Normal arterial pH:",o:["7.20–7.30","7.35–7.45","7.50–7.60","6.9–7.1"],a:1,w:"Below=acidemia, above=alkalemia."},
{m:2,d:1,q:"ROME =",o:["Resp Opposite, Metab Equal","Renal Output Mean Excretion","Rapid O₂ More Effort","Resp Only Metab Extra"],a:0,w:"Resp: pH&CO₂ opposite. Metab: pH&HCO₃⁻ equal."},
{m:2,d:1,q:"pH is proportional to:",o:["PaCO₂/HCO₃⁻","HCO₃⁻ (kidney) / PaCO₂ (lungs)","Na⁺/K⁺","O₂/CO₂"],a:1,w:"Base/acid ratio."},
{m:2,d:1,q:"'Na⁺ = water' means serum Na⁺ reflects:",o:["Total body salt","Na⁺-to-water ratio (concentration)","Potassium","Kidney size"],a:1,w:"Sodium problems are water problems."},
{m:2,d:1,q:"Acidosis shifts K⁺:",o:["Into cells (hypoK)","Out of cells (hyperK)","No effect","Into urine only"],a:1,w:"H⁺ in, K⁺ out. Alkalosis = reverse."},
{m:2,d:1,q:"IV potassium must:",o:["Be pushed fast","NEVER be IV push (lethal); give diluted on monitor","Be given with no monitor","Be oral only"],a:1,w:"Bolus K⁺ causes arrest. Also check Mg²⁺."},
{m:2,d:2,q:"3 days vomiting →",o:["Metabolic acidosis + hyperK","Metabolic alkalosis + hypoK","Respiratory acidosis","No change"],a:1,w:"Lose gastric H⁺→alkalosis→K⁺ into cells."},
{m:2,d:2,q:"Opioid OD, RR 6 → ABG:",o:["pH↑ PaCO₂↓","pH↓ PaCO₂↑ (resp acidosis)","pH↑ HCO₃⁻↑","Normal"],a:1,w:"Hypoventilation retains CO₂. Fix=ventilation/naloxone."},
{m:2,d:2,q:"Hypocalcemia is an airway emergency because:",o:["Raises BP","Hyper-excitable nerves → laryngospasm/tetany","Causes bleeding","Stops heart instantly"],a:1,w:"Trousseau/Chvostek; seizure+airway risk."},
{m:2,d:2,q:"During DKA treatment K⁺ typically:",o:["Rises dangerously","Falls — insulin drives K⁺ into cells","Stays fixed","Is irrelevant"],a:1,w:"Watch K⁺ obsessively; replace as it crashes."},
{m:2,d:2,q:"In severe hyperkalemia the FIRST drug stabilizes the heart:",o:["Insulin","IV calcium (raises threshold; doesn't lower K⁺)","Albuterol","Dialysis"],a:1,w:"Stabilize → shift → remove."},
{m:2,d:2,q:"Why correct Na⁺ disorders slowly?",o:["Cost","Rapid shift moves brain water dangerously","Kidney rule","No reason"],a:1,w:"Osmotic demyelination / cerebral edema."},
{m:2,d:3,q:"pH 7.30, PaCO₂ 30, HCO₃⁻ 15, AG 22, lactate 6:",o:["Resp alkalosis","High-AG metabolic acidosis — treat the cause","Metabolic alkalosis","Normal"],a:1,w:"Metab (pH/HCO₃⁻ equal), gap from lactate → fix perfusion."},
{m:2,d:3,q:"pH 7.37, PaCO₂ 60, HCO₃⁻ 34:",o:["Acute resp acidosis","Fully compensated resp acidosis (chronic, COPD)","Metabolic alkalosis","Error"],a:1,w:"Near-normal pH, both CO₂ & HCO₃⁻ high = chronic."},
{m:2,d:3,q:"Classic cause of metabolic alkalosis:",o:["Diarrhea","Vomiting / diuretics","Lactic acidosis","Opioids"],a:1,w:"Loss of acid or volume/Cl⁻/K⁺."},
{m:2,d:3,q:"Anion gap is used to:",o:["Measure O₂","Subtype metabolic acidosis (high vs normal gap)","Measure pH","Find K⁺"],a:1,w:"High=lactate/ketone/toxin; normal=diarrhea/renal."},
{m:2,d:3,q:"Septic-shock ABG + fix:",o:["Resp alkalosis; give bicarb","High-AG metabolic acidosis; restore perfusion","Metab alkalosis; fluids","Normal; observe"],a:1,w:"Bicarb chases the number; perfusion fixes the cause."},
/* M3 */
{m:3,d:1,q:"MAP ≈",o:["HR×SV","CO×SVR","SV/HR","Preload×afterload"],a:1,w:"Body's Ohm's law."},
{m:3,d:1,q:"Cardiac output =",o:["HR × SV","MAP × SVR","SV − HR","Preload+afterload"],a:0,w:"Two levers."},
{m:3,d:1,q:"Preload =",o:["Resistance to eject against","Ventricular stretch/filling before contraction","Heart rate","Contractility"],a:1,w:"End-diastolic stretch."},
{m:3,d:1,q:"Afterload =",o:["Filling volume","Resistance the ventricle ejects against","Heart rate","Coronary flow"],a:1,w:"≈ SVR/aortic pressure."},
{m:3,d:1,q:"Stroke volume's 3 dials:",o:["HR, BP, O₂","Preload, contractility, afterload","Na, K, Ca","Rate, rhythm, axis"],a:1,w:"The SV determinants."},
{m:3,d:1,q:"Coronary (heart-muscle) perfusion occurs mainly in:",o:["Systole","Diastole","Both equal","Inspiration"],a:1,w:"Fast HR/low diastolic pressure starves the heart."},
{m:3,d:2,q:"Frank–Starling:",o:["More preload → stronger contraction → more SV","Higher HR always ↑CO","Afterload irrelevant","Contractility fixed"],a:0,w:"Until overstretched (failure)."},
{m:3,d:2,q:"Baroreflex to a sudden BP drop:",o:["Slows HR, dilates","Speeds HR, constricts vessels","No change","Stops heart"],a:1,w:"Neg-feedback BP defense."},
{m:3,d:2,q:"Very fast HR can LOWER CO because:",o:["Heart tires","Short diastole → less filling → ↓SV","SVR rises","O₂ rises"],a:1,w:"CO=HR×SV can fall despite high rate."},
{m:3,d:2,q:"Narrow pulse pressure + tachycardia suggests:",o:["Healthy","Early compensated volume loss","High preload","Bradycardia"],a:1,w:"Baroreflex propping MAP — compensated≠stable."},
{m:3,d:3,q:"Sepsis lowers BP mainly by:",o:["Massive vasodilation → ↓SVR → ↓MAP","Bradycardia","High preload","↑contractility"],a:0,w:"Distributive shock (links M1)."},
{m:3,d:3,q:"Low ejection fraction (HFrEF) means:",o:["Too much preload","Ventricle ejects an abnormally low fraction","High afterload only","Normal heart"],a:1,w:"EF=SV/EDV; systolic failure."},
{m:3,d:3,q:"A vasodilator (afterload reducer) in a failing heart:",o:["↑ resistance to eject","↓ resistance to eject → easier forward flow","Stops the heart","Raises K⁺"],a:1,w:"Core HF lever."},
{m:3,d:3,q:"Match: norepinephrine in septic shock targets:",o:["Preload","SVR (raises it → ↑MAP)","Contractility only","HR only"],a:1,w:"Restores vascular tone to MAP≥65."},
{m:3,d:3,q:"Fluids in shock primarily raise:",o:["Afterload","Preload","SVR","HR"],a:1,w:"Refill the tank → ↑SV via Starling."},
{m:3,d:2,q:"Inotrope changes:",o:["Preload","Contractility","Afterload","HR only"],a:1,w:"Positive inotrope = stronger pump."},
/* M4 */
{m:4,d:1,q:"Heart failure is:",o:["An infection","Pump too weak/stiff to meet demand","High K⁺","A lung disease"],a:1,w:"Systolic or diastolic."},
{m:4,d:1,q:"LEFT-sided HF causes:",o:["Leg edema only","Pulmonary congestion (crackles, dyspnea)","High Na⁺","Bradycardia"],a:1,w:"Backs up into the lungs."},
{m:4,d:1,q:"RIGHT-sided HF causes:",o:["Pulmonary edema","Systemic congestion: leg edema, JVD","Low K⁺","Fever"],a:1,w:"Backs up into the body."},
{m:4,d:1,q:"Troponin =",o:["A diuretic","Blood marker of cardiac muscle injury","A rhythm","An electrolyte"],a:1,w:"Confirms MI."},
{m:4,d:1,q:"MI =",o:["Fast heart rate","Heart-muscle death from blocked coronary flow","Low BP","Valve infection"],a:1,w:"M1 Chain 1, locally."},
{m:4,d:1,q:"BNP is elevated in:",o:["Dehydration","Heart failure / volume overload","Low K⁺","Anemia"],a:1,w:"Stretched ventricles release BNP."},
{m:4,d:2,q:"Earliest home HF warning + threshold:",o:["Chest pain","Daily weight ↑ >2–3 lb/day or 5 lb/week","Headache","Cough only"],a:1,w:"Fluid before frank dyspnea."},
{m:4,d:2,q:"MI chain to troponin:",o:["Too much ATP","Blocked flow→no O₂/ATP→pump fails→infarct→troponin","High pH","Excess Ca²⁺"],a:1,w:"Chain 1 in the heart."},
{m:4,d:2,q:"Atrial fibrillation main dangers:",o:["Clot/stroke + poor rate/filling","Hyperthermia","Low Na⁺","Airway loss"],a:0,w:"Stasis→clot; fast irregular→↓CO."},
{m:4,d:2,q:"Loop diuretic vs ACE inhibitor on K⁺:",o:["Both raise K⁺","Diuretic LOWERS K⁺, ACE RAISES K⁺","Both lower","No effect"],a:1,w:"Watch the combo (M2 link)."},
{m:4,d:2,q:"In HF the body's compensations:",o:["Always help","Eventually worsen congestion (compensation can harm)","Cure the heart","Lower troponin"],a:1,w:"M1 Ch6: compensatory≠good."},
{m:4,d:3,q:"Cardiogenic shock is:",o:["Empty tank","Broken pump (e.g., big MI)","Floppy pipes","Blocked pipe"],a:1,w:"NOT a fluid-bolus problem."},
{m:4,d:3,q:"Beta-blocker: classic HOLD parameter:",o:["Hold if HR <60 or low SBP","Give regardless","Hold if fever","Hold if high K⁺"],a:0,w:"Also don't stop abruptly."},
{m:4,d:3,q:"Nitroglycerin is contraindicated with:",o:["Aspirin","PDE-5 inhibitors (sildenafil)","Oxygen","Statins"],a:1,w:"Severe hypotension risk."},
{m:4,d:3,q:"Digoxin toxicity sign:",o:["Yellow-green visual halos + nausea","Bradycardia only","Rash","High Na⁺"],a:0,w:"Worse with low K⁺."},
{m:4,d:3,q:"HF teaching — when to call:",o:["Never","Weight ↑ >2–3 lb/day, worsening dyspnea/orthopnea","Only chest pain","After 10 lb"],a:1,w:"Catch decompensation early."},
{m:4,d:3,q:"Cardiogenic shock: why no fluid bolus?",o:["Cost","Floods a failing pump → worse pulmonary edema","Raises K⁺","Slows HR"],a:1,w:"Pump, not tank — different broken block."},
/* M5 */
{m:5,d:1,q:"Ventilation primarily controls:",o:["O₂","CO₂","HCO₃⁻","K⁺"],a:1,w:"Oxygenation is a separate axis."},
{m:5,d:1,q:"Oxygenation =",o:["CO₂ removal","Getting O₂ into blood (PaO₂/SpO₂)","Heart rate","Acid load"],a:1,w:"Two distinct problems."},
{m:5,d:1,q:"SpO₂ estimates:",o:["CO₂","Hemoglobin O₂ saturation","BP","pH"],a:1,w:"O₂ side; not O₂ delivery."},
{m:5,d:1,q:"Main normal drive to breathe:",o:["Low O₂","Rising CO₂ / acidity","High K⁺","Cold"],a:1,w:"Central chemoreceptors."},
{m:5,d:1,q:"In acute respiratory distress, priority is:",o:["Document","Airway/Breathing first — act","Labs","Reassess in 1 h"],a:1,w:"ABC; emergency = act."},
{m:5,d:2,q:"V/Q mismatch =",o:["Perfectly matched","Air & blood flow to lung units mismatched","Heart stopped","High Na⁺"],a:1,w:"Impairs gas exchange."},
{m:5,d:2,q:"Shunt vs dead space:",o:["Same","Shunt=perfused not ventilated; dead space=ventilated not perfused","Both ↓HR","Both ↑pH"],a:1,w:"Shunt→refractory hypoxemia."},
{m:5,d:2,q:"Right shift of O₂–Hb curve (fever, acidosis):",o:["Holds O₂ tighter","Unloads O₂ to tissues more easily","Stops breathing","Raises pH"],a:1,w:"Delivery where metabolism is high."},
{m:5,d:2,q:"Type 1 vs Type 2 respiratory failure:",o:["Type1=oxygenation(low O₂); Type2=ventilation(high CO₂)","Identical","Type1 always fatal","Type2 normal CO₂"],a:0,w:"Type 2 → respiratory acidosis (M2)."},
{m:5,d:2,q:"Incentive spirometer is used to:",o:["Lower BP","Prevent atelectasis (deep breaths, post-op)","Give O₂","Suction"],a:1,w:"~10×/hr while awake."},
{m:5,d:3,q:"ARDS causes refractory hypoxemia via:",o:["Dead space only","Widespread shunt (alveoli flooded)","High pH","Bradycardia"],a:1,w:"O₂ alone won't fix shunt → escalate (PEEP/vent)."},
{m:5,d:3,q:"Hypoventilation's ABG effect:",o:["Resp alkalosis","Resp acidosis (CO₂↑, pH↓)","Metab alkalosis","No change"],a:1,w:"Same axis as the opioid case (M2)."},
{m:5,d:3,q:"COPD chronic retainer + O₂:",o:["Withhold O₂","Titrate to ordered target (~88–92%), watch CO₂/drowsiness","Always 15 L","O₂ is toxic instantly"],a:1,w:"Don't withhold needed O₂; don't over-oxygenate blindly."},
{m:5,d:3,q:"Sudden dyspnea, sharp pain, clear lungs, SpO₂ 86%:",o:["Pneumonia","PE (dead space)","Asthma","Normal"],a:1,w:"Clot blocks perfusion → dead space."},
{m:5,d:3,q:"Refractory low SpO₂ on high O₂ — best action:",o:["Increase O₂ and recheck in 1 h","Escalate (shunt physiology — needs PEEP/vent)","Document only","Stop O₂"],a:1,w:"More FiO₂ won't fix a shunt."},
{m:5,d:2,q:"Asthma inhaler order:",o:["Steroid then rescue","Rescue (bronchodilator) THEN steroid; rinse after steroid","Only steroid","Order irrelevant"],a:1,w:"Open airways first; rinse prevents thrush."}
];
const RANKS=["🟢 Student","🔵 New Grad RN","🟣 ICU RN","🟠 Rapid Response","🔴 Resus Lead"];
const MN={1:"Homeostasis & the Cell",2:"Fluids · Lytes · Acid–Base",3:"Cardiovascular Physiology",4:"Cardiovascular Patho",5:"Respiratory & Gas Exchange"};
const RUN=15, PASS=11, MAXLVL=4, KEY="codecc_v2";
let S=load();
function def(){return{prog:{},best:0,streak:0,lastDay:"",sel:[1]}}
function load(){try{return Object.assign(def(),JSON.parse(localStorage.getItem(KEY)))}catch(e){return def()}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function keyOf(sel){return sel.slice().sort((a,b)=>a-b).join("-")}
function lvl(sel){return S.prog[keyOf(sel)]||0}
function setLvl(sel,v){S.prog[keyOf(sel)]=v;save()}
const app=document.getElementById('app');
let G=null;

/* difficulty mix per level (run is sorted easy→hard so it ramps) */
const BAND=[[1,1,2],[1,2,2],[2,2,3],[2,3,3],[3,3,3]];
function buildRun(sel,level){
  const want=BAND[level], all=Q.filter(x=>sel.includes(x.m));
  let chosen=[];
  // fill from wanted difficulties first
  want.forEach(d=>{});
  const byD={1:shuf(all.filter(x=>x.d===1)),2:shuf(all.filter(x=>x.d===2)),3:shuf(all.filter(x=>x.d===3))};
  // target counts from BAND distribution scaled to RUN
  const cnt={1:0,2:0,3:0}; want.forEach(d=>cnt[d]++);
  const tot=want.length;
  [1,2,3].forEach(d=>{ let n=Math.round(RUN*cnt[d]/tot); for(let i=0;i<n && byD[d].length;i++) chosen.push(byD[d].pop()); });
  // top up to RUN with closest available (no duplicates)
  let leftover=[...byD[1],...byD[2],...byD[3]];
  leftover.sort((a,b)=>Math.abs(a.d-level/2)-Math.abs(b.d-level/2));
  while(chosen.length<RUN && leftover.length) chosen.push(leftover.shift());
  chosen=chosen.slice(0,RUN).sort((a,b)=>a.d-b.d);   // ramp easy→hard
  return chosen;
}
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function home(){
  const sel=S.sel, L=lvl(sel);
  app.innerHTML=`
  <div class="card">
    <div class="row"><span class="badge">${RANKS[L]}</span>
      <span class="small">Level ${L+1}/5 · ${sel.length>1?"mixed set":"M"+sel[0]}</span></div>
    <div class="bar" style="margin-top:10px"><i style="width:${(L/MAXLVL*100)}%"></i></div>
    <div class="small" style="margin-top:8px">🔥 best combo ${S.best} · 🗓️ streak ${S.streak}d ·
      reach 🔴 + pass → next module at 🟢</div>
  </div>
  <div class="card">
    <b>Pick module(s)</b> <span class="small">— switching shows that set's own level</span>
    <div class="mods" id="mods">
      ${[1,2,3,4,5].map(m=>`<label><input type="checkbox" value="${m}" ${sel.includes(m)?"checked":""}
        onchange="reSel()"><span><b>M${m}</b> · ${MN[m]}</span>
        <span class="mlvl">${RANKS[S.prog[String(m)]||0].split(" ")[0]} L${(S.prog[String(m)]||0)+1}</span></label>`).join("")}
    </div>
    <button class="ghost" onclick="allMods()">Select all 5 (mixed run)</button>
    <button class="primary" onclick="startRun()">▶ Start — 15 questions, ${RANKS[L]}</button>
    <div class="small center" style="margin-top:8px">Questions ramp easy→hard each run and get harder every level.</div>
  </div>
  <div class="card small">Pass = <b>${PASS}/15</b> correct → level up (harder next time).
    Levels are saved <b>per module</b>. <button class="ghost" onclick="resetAll()">Reset all progress</button></div>`;
}
function reSel(){const s=[...document.querySelectorAll('#mods input:checked')].map(x=>+x.value);
  if(s.length){S.sel=s;save();home();}}
function allMods(){S.sel=[1,2,3,4,5];save();home();}
function resetAll(){if(confirm("Erase all progress?")){S=def();save();home();}}

function startRun(){
  const sel=S.sel; if(!sel.length){alert("Pick a module");return}
  const L=lvl(sel);
  const today=new Date().toISOString().slice(0,10);
  if(S.lastDay!==today){const y=new Date();y.setDate(y.getDate()-1);
    S.streak=(S.lastDay===y.toISOString().slice(0,10))?S.streak+1:1;S.lastDay=today;save();}
  G={sel,L,pool:buildRun(sel,L),i:0,correct:0,combo:0,score:0,runBest:0};
  ask();
}
function ask(){
  const it=G.pool[G.i], opts=shuf(it.o.map((t,idx)=>({t,idx})));
  G.cur={it,opts};
  app.innerHTML=`
  <div class="card">
    <div class="row"><span class="badge">${RANKS[G.L]}</span>
      <span class="small">Q ${G.i+1}/${RUN} · M${it.m} · ${"★".repeat(it.d)}</span></div>
    <div class="bar" style="margin-top:8px"><i style="width:${G.i/RUN*100}%"></i></div>
    <div class="row" style="margin-top:10px"><span class="combo">🔥×${G.combo}</span>
      <span class="small">✔ ${G.correct} · need ${PASS}</span></div>
  </div>
  <div class="card">
    <div class="q">${it.q}</div>
    <div id="opts">${opts.map((o,k)=>`<button class="opt" onclick="ans(${k})">${o.t}</button>`).join("")}</div>
    <div id="post"></div>
  </div>`;
}
function ans(k){
  const {it,opts}=G.cur, right=opts[k].idx===it.a;
  [...document.querySelectorAll('#opts .opt')].forEach((b,idx)=>{b.disabled=true;
    if(opts[idx].idx===it.a)b.classList.add('correct');
    if(idx===k&&!right)b.classList.add('wrong');});
  if(right){G.combo++;G.correct++;G.score+=10*it.d*G.combo;if(G.combo>G.runBest)G.runBest=G.combo;
    if(G.combo>S.best){S.best=G.combo;save();}}
  else G.combo=0;
  document.getElementById('post').innerHTML=
    `<div class="why"><b>${right?"✅ correct":"❌"}</b> — ${it.w}</div>
     <button class="primary" onclick="nxt()">${G.i+1>=RUN?"See result":"Next ▶"}</button>`;
}
function nxt(){ if(++G.i>=RUN) return result(); ask(); }
function result(){
  const passed=G.correct>=PASS, sel=G.sel, L=G.L;
  let msg="", action="";
  if(passed && L<MAXLVL){ setLvl(sel,L+1);
    msg=`🎉 <b>RANK UP → ${RANKS[L+1]}</b><br>Harder questions next run.`; }
  else if(passed && L===MAXLVL){
    msg=`🏆 <b>MODULE MASTERED at ${RANKS[L]}!</b>`;
    if(sel.length===1){ const nextM=sel[0]+1;
      if(MN[nextM]){ action=`<button class="primary" onclick="goNext(${nextM})">➡ Next: M${nextM} ${MN[nextM]} (start 🟢 Student)</button>`;
        msg+=`<br>Ready for Module ${nextM}.`; }
      else msg+="<br>That's the last built module — more coming."; }
  } else {
    msg=`Need <b>${PASS}/15</b> to rank up — you got ${G.correct}. Same level, try again (it shuffles).`; }
  app.innerHTML=`
  <div class="card center">
    <div class="big">${passed?"✅ Passed":"🔁 Keep going"}</div>
    <div>${G.correct}/15 correct · score ${G.score} · 🔥 best ${G.runBest}</div>
    <div class="why" style="text-align:left;margin-top:12px">${msg}</div>
    ${action}
    <button class="primary" onclick="startRun()">Play again (${RANKS[lvl(sel)]})</button>
    <button class="ghost" onclick="home()">Home / change modules</button>
  </div>`;
}
function goNext(m){ S.sel=[m]; save(); home(); }
home();
</script>
</body>
</html>
